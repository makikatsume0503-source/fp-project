name: Xserver自動デプロイ

on:
  push:
    branches:
      - main
      - claude/multi-agent-system-kma8C

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTPデプロイ
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: sv12606.xserver.jp
          username: xs234918
          password: ${{ secrets.FTP_PASS }}
          server-dir: /home/xs234918/fp-makikatsume.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            agents/**
            output/**
            .env
            main.py
            requirements.txt
            deploy.py
